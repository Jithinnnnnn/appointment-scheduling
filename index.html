<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Appointment Scheduling</title>
    <link rel="icon" href="public/logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <img src="public/Capminds logo 4.png" alt="Capminds" />
        </div>
        <button class="primary" id="openModal">+ Book Appointment</button>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <button class="collapse" id="collapseBtn" aria-label="Collapse sidebar">&laquo;</button>
          <nav class="nav">
            <a class="nav-item active" href="#" data-view="calendar">

            </a>
            <a class="nav-item" href="#" data-view="dashboard">

        <main class="content">
          <section class="calendar-card view active" id="calendarView" data-view-panel="calendar">
            <div class="calendar-header">
              <div class="nav-left">
                <button class="icon" id="prevMonth" aria-label="Previous month">&#8249;</button>
                <div class="month" id="monthLabel">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M3.33333 14.6667C2.96667 14.6667 2.65267 14.536 2.39133 14.2747C2.13 14.0134 1.99956 13.6996 2 13.3334V4.00004C2 3.63337 2.13067 3.31937 2.392 3.05804C2.65333 2.79671 2.96711 2.66626 3.33333 2.66671H4V1.33337H5.33333V2.66671H10.6667V1.33337H12V2.66671H12.6667C13.0333 2.66671 13.3473 2.79737 13.6087 3.05871C13.87 3.32004 14.0004 3.63382 14 4.00004V13.3334C14 13.7 13.8693 14.014 13.608 14.2754C13.3467 14.5367 13.0329 14.6672 12.6667 14.6667H3.33333ZM3.33333 13.3334H12.6667V6.66671H3.33333V13.3334ZM3.33333 5.33337H12.6667V4.00004H3.33333V5.33337Z" fill="#2E2E2E"/>
                  </svg>
                  <span class="month-text">January 2023</span>
                </div>
                <button class="icon" id="nextMonth" aria-label="Next month">&#8250;</button>
              </div>
              <div class="nav-right">
                <button class="ghost" id="todayBtn">Today</button>
                <select class="select" aria-label="View">
                  <option>Month</option>
                </select>
              </div>
            </div>

            <div class="calendar-subtitle">James Marry</div>


            <div class="calendar-grid">
              <div class="weekday">Sunday</div>
              <div class="weekday">Monday</div>
              <div class="weekday">Tuesday</div>
              <div class="weekday">Wednesday</div>
              <div class="weekday">Thursday</div>
              <div class="weekday">Friday</div>
              <div class="weekday">Saturday</div>
            </div>

            <div class="calendar-days" id="calendarDays" aria-live="polite"></div>
          </section>
          <section class="dashboard-card view" id="dashboardView" data-view-panel="dashboard" aria-label="Dashboard">
            <h2 class="dashboard-title">Practice Dashboard</h2>
            <div class="dashboard-body">
              <div class="dashboard-filters">
                <label class="filter-field">
                  <span class="filter-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" aria-label="Search">
                      <circle cx="11" cy="11" r="6.5" stroke="currentColor" fill="none" stroke-width="1.6"/>
                      <path d="M16.2 16.2L21 21" stroke="currentColor" fill="none" stroke-width="1.6"/>
                    </svg>
                  </span>
                  <input type="text" id="patientSearch" placeholder="Patient Search" aria-label="Patient Search" />
                </label>
                <label class="filter-field">
                  <span class="filter-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" aria-label="Search">
                      <circle cx="11" cy="11" r="6.5" stroke="currentColor" fill="none" stroke-width="1.6"/>
                      <path d="M16.2 16.2L21 21" stroke="currentColor" fill="none" stroke-width="1.6"/>
                    </svg>
                  </span>
                  <input type="text" id="doctorSearch" placeholder="Doctor Search" aria-label="Doctor Search" />
                </label>
                <label class="filter-field">
                  <span class="filter-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" aria-label="Date">
                      <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" fill="none" stroke-width="1.6"/>
                      <path d="M8 3v4M16 3v4M3 10h18" stroke="currentColor" fill="none" stroke-width="1.6"/>
                    </svg>
                  </span>
                  <input type="date" id="startDate" aria-label="Start Date" value="2026-04-01" />
                </label>
                <label class="filter-field">
                  <span class="filter-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" aria-label="Date">
                      <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" fill="none" stroke-width="1.6"/>
                      <path d="M8 3v4M16 3v4M3 10h18" stroke="currentColor" fill="none" stroke-width="1.6"/>
                    </svg>
                  </span>
                  <input type="date" id="endDate" aria-label="End Date" value="2026-04-01" />
                </label>
                <button class="filter-button" id="updateFilters" type="button">Update</button>
              </div>

              <div class="appointments">
                <div class="appointments-title">Appointment Details</div>
                <header class="appointments-header" role="row">
                  <div role="columnheader">Patient</div>
                  <div role="columnheader">Doctor</div>
                  <div role="columnheader">Hospital</div>
                  <div role="columnheader">Specialty</div>
                  <div role="columnheader">Select Date</div>
                  <div role="columnheader">Select Time</div>
                  <div role="columnheader" class="appointments-actions">Action</div>
                </header>
                <div class="appointments-body" id="appointmentsBody" role="rowgroup"></div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
